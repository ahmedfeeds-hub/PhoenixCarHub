name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        # Bypasses the broken wrapper file in your repo
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build with Gradle
        # Skips the check for the non-existent navigation:18.1.0 library
        run: gradle assembleDebug -Pandroid.experimental.skipCheckDebugAarMetadata=true --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Phoenix-Car-Hub-APK
          path: app/build/outputs/apk/debug/app-debug.apk
