name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        # This bypasses your uploaded wrapper and uses GitHub's fresh tools
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build with Gradle
        # --continue lets it try to finish even if it hits a small metadata snag
        run: gradle assembleDebug --no-daemon --continue

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Phoenix-Car-Hub-APK
          path: app/build/outputs/apk/debug/app-debug.apk
